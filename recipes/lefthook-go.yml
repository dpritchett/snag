pre-commit:
  jobs:
    - name: go-fmt
      run: go fmt ./...
      stage_fixed: true
      fail_text: "go fmt reformatted files — changes have been staged, please re-commit."
    - name: go-vet
      run: go vet ./...
      fail_text: "go vet found issues."
    - name: go-test
      run: go test ./...
      fail_text: "go test failed."
